<!doctype html>
<html lang="en" style="height: 100%" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nimbostradice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    .center {
        display: flex;
        justify-content: center;
        height: inherit;
    }
</style>
<body class="center">
    <div style="height: inherit;width: 520px;min-width: 320px;align-content: center; padding-left: 3rem; padding-right: 3rem;">
        <h1>Login</h1>
<!--        <form>-->
        <form method="post">
        <div class="mb-3">
            <label for="userInput"></label><input type="text" class="form-control" id="userInput" name="userInput" placeholder="Email/Username">
        </div>
        <div class="mb-3">
            <label for="pwInput"></label><input type="password" class="form-control" id="pwInput" name="pwInput" placeholder="Password" aria-describedby="passwordHelp">
            <button type="button" class="btn btn-link" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot Password</button>
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="rememberMeCheck" name="rememberMeCheck">
            <label class="form-check-label" for="rememberMeCheck">Remember Me</label>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

<!-- Forgot Password Modal -->
<div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body">
                <h3>Reset Password</h3>
                <label for="pwResetEmail"></label><input type="email" class="form-control" id="pwResetEmail" placeholder="Email">
                <label for="pwResetUser"></label><input type="text" class="form-control" id="pwResetUser" placeholder="Username">
                <label for="pwResetPw1"></label><input type="password" class="form-control" id="pwResetPw1" placeholder="Password">
                <label for="pwResetPw2"></label><input type="password" class="form-control" id="pwResetPw2" placeholder="Password">
                <div class="d-md-flex justify-content-md-end">
                    <button type="button" class="btn btn-primary align-right" style="margin-top: 32px;">Reset Password</button>
                </div>

            </div>
        </div>
    </div>
</div>
</html>
